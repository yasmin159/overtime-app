<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Call Center Overtime Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:sans-serif;background:#f8fafc;min-height:100vh;}select,input,textarea,button{font-family:inherit;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const GAS_URL="https://script.google.com/a/macros/mazama.ai/s/AKfycby9G8nLTfAySH_6DL0udcmqHMcMoWqJ_mr7wrcpEUogiogMBT6kW2KEHAJsv58AHFMi/exec";
const EMOJIS=["🔥","💰","🏆","⚡","🎯","🎉","💎","🚀","⭐","🎁","💪","🏅"];

const TIME_OPTIONS=(()=>{
  const t=[];
  for(let h=6;h<=22;h++) for(let m of [0,15,30,45]){if(h===22&&m>0)break;t.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);}
  return t;
})();

const buildSlot=(s,e)=>s&&e?`${s}-${e}`:"";
const getMonday=(date)=>{const d=new Date(date),day=d.getDay();d.setDate(d.getDate()-day+(day===0?-6:1));d.setHours(0,0,0,0);return d;};
const weekKey=(m)=>m.toISOString().slice(0,10);
const fmtDate=(d)=>d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const fmtWeek=(m)=>{const s=new Date(m);s.setDate(s.getDate()+6);return `${fmtDate(m)} – ${fmtDate(s)}`;};

const parseHours=(slot)=>{
  if(!slot)return 0;
  const m=slot.match(/(\d{1,2}):(\d{2})-(\d{1,2}):(\d{2})/);
  if(!m)return 0;
  const diff=(parseInt(m[3])*60+parseInt(m[4]))-(parseInt(m[1])*60+parseInt(m[2]));
  return diff>0?diff/60:0;
};
const fmtHours=(h)=>{
  if(!h||h===0)return "—";
  const hrs=Math.floor(h),mins=Math.round((h-hrs)*60);
  return mins===0?`${hrs}h`:`${hrs}h ${mins}m`;
};

const newOT=()=>({id:`${Date.now()}-${Math.random()}`,start:"",end:"",slot:"",approved:null,confirmed:false,sales:"",autopays:"",points:"",timeType:"same",realStart:"",realEnd:"",realTime:""});
const emptyDay=()=>({shift:"",overtimes:[]});
const emptyWeek=(agts)=>{const s={};agts.forEach(a=>{s[a.id]={};DAYS.forEach(d=>{s[a.id][d]=emptyDay();});});return s;};
const defaultAgents=[{id:1,name:"Agent 1",rank:1},{id:2,name:"Agent 2",rank:2},{id:3,name:"Agent 3",rank:3},{id:4,name:"Agent 4",rank:4},{id:5,name:"Agent 5",rank:5}];

const postToSheet=async(payload)=>{
  try{await fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});}
  catch(e){console.error(e);}
};
const LS={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

function App(){
  const today=new Date();
  const thisMon=getMonday(today);
  const nextMon=new Date(thisMon);nextMon.setDate(nextMon.getDate()+7);
  const thisKey=weekKey(thisMon),nextKey=weekKey(nextMon);

  const [tab,setTab]=useState("calendar");
  const [activeWeek,setActiveWeek]=useState(thisKey);
  const [weekAgents,setWeekAgents]=useState(()=>LS.get("weekAgents")||{[thisKey]:defaultAgents,[nextKey]:defaultAgents});
  const [weekSchedule,setWeekSchedule]=useState(()=>LS.get("weekSchedule")||{[thisKey]:emptyWeek(defaultAgents),[nextKey]:emptyWeek(defaultAgents)});
  const [weekNotes,setWeekNotes]=useState(()=>LS.get("weekNotes")||{});
  const [rankEdit,setRankEdit]=useState(false);
  const [importMsg,setImportMsg]=useState("");
  const [confirmModal,setConfirmModal]=useState(null);
  const [confirmForm,setConfirmForm]=useState({confirmed:false,sales:"",autopays:"",points:"",timeType:"same",realStart:"",realEnd:""});
  const [noteModal,setNoteModal]=useState(null);
  const [noteForm,setNoteForm]=useState({text:"",emoji:"🔥"});

  const agents=weekAgents[activeWeek]||defaultAgents;
  const schedule=weekSchedule[activeWeek]||emptyWeek(agents);
  const sortedAgents=[...agents].sort((a,b)=>a.rank-b.rank);
  const weekLabel=(k)=>k===thisKey?"This Week":"Next Week";
  const weekMon=(k)=>k===thisKey?thisMon:nextMon;

  const setAgents=(na)=>{const nwa={...weekAgents,[activeWeek]:na};setWeekAgents(nwa);LS.set("weekAgents",nwa);};
  const getCell=(aid,day)=>(weekSchedule[activeWeek]?.[aid]?.[day])||emptyDay();
  const updateCell=(aid,day,cell)=>{
    const ns={...weekSchedule,[activeWeek]:{...weekSchedule[activeWeek],[aid]:{...weekSchedule[activeWeek]?.[aid],[day]:cell}}};
    setWeekSchedule(ns);LS.set("weekSchedule",ns);
  };

  const addOT=(aid,day)=>{const c=getCell(aid,day);if(c.overtimes.length>=6)return;updateCell(aid,day,{...c,overtimes:[...c.overtimes,newOT()]});};
  const removeOT=(aid,day,otId)=>{
    const c=getCell(aid,day);
    updateCell(aid,day,{...c,overtimes:c.overtimes.filter(o=>o.id!==otId)});
    postToSheet({action:"deleteRow",sheetName:"OT History",rowId:`${activeWeek}-${aid}-${day}-${otId}`});
  };
  const updateOTTime=(aid,day,otId,field,val)=>{
    const c=getCell(aid,day);
    const ots=c.overtimes.map(o=>{if(o.id!==otId)return o;const u={...o,[field]:val};u.slot=buildSlot(u.start,u.end);return u;});
    updateCell(aid,day,{...c,overtimes:ots});
  };
  const updateOTApproval=(aid,day,otId,val)=>{
    const c=getCell(aid,day);
    updateCell(aid,day,{...c,overtimes:c.overtimes.map(o=>o.id===otId?{...o,approved:val}:o)});
  };
  const openConfirm=(aid,day,otId)=>{
    const ot=getCell(aid,day).overtimes.find(o=>o.id===otId);
    setConfirmForm({confirmed:ot?.confirmed||false,sales:ot?.sales||"",autopays:ot?.autopays||"",points:ot?.points||"",timeType:ot?.timeType||"same",realStart:ot?.realStart||"",realEnd:ot?.realEnd||""});
    setConfirmModal({aid,day,otId});
  };
  const saveConfirm=()=>{
    if(!confirmModal)return;
    const{aid,day,otId}=confirmModal;
    const c=getCell(aid,day);
    const realTime=buildSlot(confirmForm.realStart,confirmForm.realEnd);
    const updatedOT={...c.overtimes.find(o=>o.id===otId),...confirmForm,realTime};
    updateCell(aid,day,{...c,overtimes:c.overtimes.map(o=>o.id===otId?updatedOT:o)});
    const agent=agents.find(a=>a.id===aid);
    postToSheet({action:"logOT",rowId:`${activeWeek}-${aid}-${day}-${otId}`,week:activeWeek,weekLabel:fmtWeek(weekMon(activeWeek)),day,agentName:agent?.name,slot:updatedOT.slot,timeType:updatedOT.timeType,realTime,approved:updatedOT.approved,confirmed:updatedOT.confirmed,sales:updatedOT.sales,autopays:updatedOT.autopays,points:updatedOT.points});
    setConfirmModal(null);
  };

  const getNotes=(day)=>weekNotes[activeWeek]?.[day]||[];
  const saveNotes=(day,notes)=>{const nwn={...weekNotes,[activeWeek]:{...weekNotes[activeWeek],[day]:notes}};setWeekNotes(nwn);LS.set("weekNotes",nwn);};
  const addNote=(day)=>{
    if(!noteForm.text.trim())return;
    const note={id:Date.now(),text:noteForm.text.trim(),emoji:noteForm.emoji};
    saveNotes(day,[...getNotes(day),note]);
    postToSheet({action:"logNote",noteId:`${activeWeek}-${day}-${note.id}`,week:activeWeek,weekLabel:fmtWeek(weekMon(activeWeek)),day,emoji:note.emoji,text:note.text});
    setNoteForm({text:"",emoji:"🔥"});setNoteModal(null);
  };
  const removeNote=(day,id)=>{
    saveNotes(day,getNotes(day).filter(n=>n.id!==id));
    postToSheet({action:"deleteRow",sheetName:"Daily Notes",rowId:`${activeWeek}-${day}-${id}`});
  };

  const handleCSVImport=(e)=>{
    const file=e.target.files[0];if(!file)return;
    Papa.parse(file,{header:true,skipEmptyLines:true,complete:(res)=>{
      try{
        const rows=res.data,headers=Object.keys(rows[0]).map(h=>h.trim());
        const nameCol=headers.find(h=>/agent|nombre|name/i.test(h));
        if(!nameCol){setImportMsg("❌ Column 'Agent' not found.");return;}
        const na=[],ns={};
        rows.forEach((row,i)=>{
          const name=String(row[nameCol]||"").trim();if(!name)return;
          const id=Date.now()+i;
          const rankPct=row["Rank%"]?parseFloat(String(row["Rank%"]).replace("%","")):null;
          na.push({id,name,rank:i+1,rankPct});ns[id]={};
          DAYS.forEach(d=>{
            const shift=row[d]?String(row[d]).trim():"";
            const ex=(weekAgents[activeWeek]||[]).find(a=>a.name===name);
            const prevOTs=ex?(weekSchedule[activeWeek]||{})[ex.id]?.[d]?.overtimes||[]:[];
            ns[id][d]={shift,overtimes:prevOTs};
          });
        });
        const nwa={...weekAgents,[activeWeek]:na},nws={...weekSchedule,[activeWeek]:ns};
        setWeekAgents(nwa);setWeekSchedule(nws);LS.set("weekAgents",nwa);LS.set("weekSchedule",nws);
        setImportMsg(`✅ ${na.length} agents imported.`);setTimeout(()=>setImportMsg(""),4000);
      }catch(err){setImportMsg("❌ Error: "+err.message);}
    }});e.target.value="";
  };

  const exportTemplate=()=>{
    const csv=Papa.unparse([["Agent","Rank%",...DAYS],...sortedAgents.map(a=>[a.name,a.rankPct||"",...DAYS.map(d=>getCell(a.id,d).shift)])]);
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const l=document.createElement("a");l.href=url;l.download=`shifts_${activeWeek}.csv`;l.click();URL.revokeObjectURL(url);
  };

  const copyToNextWeek=()=>{
    const ca=weekAgents[thisKey]||defaultAgents,cs=weekSchedule[thisKey]||{};
    const ns={};ca.forEach(a=>{ns[a.id]={};DAYS.forEach(d=>{ns[a.id][d]={shift:cs[a.id]?.[d]?.shift||"",overtimes:[]};});});
    const nwa={...weekAgents,[nextKey]:ca.map(a=>({...a}))},nws={...weekSchedule,[nextKey]:ns};
    setWeekAgents(nwa);setWeekSchedule(nws);LS.set("weekAgents",nwa);LS.set("weekSchedule",nws);
    setImportMsg("✅ Shifts copied. OT is blank.");setTimeout(()=>setImportMsg(""),4000);
  };

  // Summary calculations
  const sumByDay={};
  DAYS.forEach(d=>{sumByDay[d]={agents:[],totalSales:0,totalAutopays:0,totalPoints:0,totalOTs:0,totalHours:0};});
  let wkS=0,wkA=0,wkP=0,wkO=0,wkH=0;
  const agentTotals={};
  sortedAgents.forEach(agent=>{
    let as=0,apts=0,ah=0,asess=0;
    DAYS.forEach(day=>{
      getCell(agent.id,day).overtimes.filter(o=>o.confirmed&&o.slot).forEach(ot=>{
        const s=parseFloat(ot.sales)||0,a=parseInt(ot.autopays)||0,p=parseInt(ot.points)||0,h=parseHours(ot.slot);
        sumByDay[day].agents.push({name:agent.name,slot:ot.slot,sales:s,autopays:a,points:p,hours:h,approved:ot.approved});
        sumByDay[day].totalSales+=s;sumByDay[day].totalAutopays+=a;sumByDay[day].totalPoints+=p;sumByDay[day].totalOTs+=1;sumByDay[day].totalHours+=h;
        wkS+=s;wkA+=a;wkP+=p;wkO+=1;wkH+=h;
        as+=s;apts+=p;ah+=h;asess+=1;
      });
    });
    agentTotals[agent.id]={sales:as,points:apts,hours:ah,sessions:asess};
  });

  const histRows=[];
  sortedAgents.forEach(agent=>{
    DAYS.forEach(day=>{
      getCell(agent.id,day).overtimes.forEach(ot=>{
        if(ot.slot||ot.start) histRows.push({agentName:agent.name,day,slot:ot.slot||`${ot.start}-?`,approved:ot.approved,confirmed:ot.confirmed,sales:ot.sales,autopays:ot.autopays,points:ot.points,timeType:ot.timeType,realTime:ot.realTime,hours:parseHours(ot.slot)});
      });
    });
  });

  const managerRows=[];
  sortedAgents.forEach(agent=>{
    DAYS.forEach(day=>{
      getCell(agent.id,day).overtimes.forEach(ot=>{
        if(ot.start||ot.slot) managerRows.push({agent,day,ot});
      });
    });
  });

  const th={padding:"10px 12px",textAlign:"center",borderBottom:"2px solid #e5e7eb",fontSize:13,color:"#374151",whiteSpace:"nowrap"};
  const td={padding:"8px 10px",borderBottom:"1px solid #f3f4f6",fontSize:13,verticalAlign:"top"};
  const sel={width:"100%",padding:"3px 4px",border:"1px solid #e5e7eb",borderRadius:6,fontSize:12,cursor:"pointer"};

  const TabBtn=({k,label})=>(
    <button onClick={()=>setTab(k)} style={{padding:"10px 20px",background:tab===k?"#4f46e5":"#e5e7eb",color:tab===k?"white":"#374151",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:14}}>{label}</button>
  );
  const WeekToggle=()=>(
    <div style={{display:"flex",gap:0,background:"#e5e7eb",borderRadius:10,padding:3,width:"fit-content",marginBottom:16}}>
      {[thisKey,nextKey].map(k=>(
        <button key={k} onClick={()=>{setActiveWeek(k);setRankEdit(false);}}
          style={{padding:"8px 20px",background:activeWeek===k?"white":"transparent",color:activeWeek===k?"#4f46e5":"#6b7280",border:"none",borderRadius:8,cursor:"pointer",fontWeight:activeWeek===k?700:500,fontSize:13,boxShadow:activeWeek===k?"0 1px 4px rgba(0,0,0,.1)":"none"}}>
          {weekLabel(k)}<br/><span style={{fontSize:11,opacity:.7}}>{fmtWeek(weekMon(k))}</span>
        </button>
      ))}
    </div>
  );

  return(
    <div style={{maxWidth:1200,margin:"0 auto",padding:16}}>

      {/* HEADER */}
      <div style={{background:"#4f46e5",borderRadius:12,padding:"16px 24px",marginBottom:20,color:"white"}}>
        <h1 style={{margin:0,fontSize:22}}>📞 Call Center Overtime Manager</h1>
        <div style={{background:"rgba(255,255,255,.15)",borderRadius:8,padding:"8px 14px",marginTop:10,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>📌</span>
          <span style={{fontSize:13,fontWeight:600}}>Please confirm your OT <u>at least 2 days in advance</u>.</span>
        </div>
        <div style={{display:"flex",gap:32,marginTop:6,flexWrap:"wrap"}}>
          <div><div style={{opacity:.7,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>This Week</div><div style={{fontWeight:700,fontSize:15}}>📅 {fmtWeek(thisMon)}</div></div>
          <div><div style={{opacity:.7,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>Next Week</div><div style={{fontWeight:600,fontSize:14,opacity:.9}}>📅 {fmtWeek(nextMon)}</div></div>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        <TabBtn k="calendar" label="📅 Calendar"/>
        <TabBtn k="manager" label="✅ Manager"/>
        <TabBtn k="notes" label="📣 Daily Notes"/>
        <TabBtn k="summary" label="📊 Summary"/>
        <TabBtn k="ranking" label="🏆 Ranking"/>
        <TabBtn k="history" label="📋 History"/>
        <TabBtn k="import" label="📂 Import Shifts"/>
      </div>
      <WeekToggle/>

      {/* CALENDAR */}
      {tab==="calendar"&&(
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
            <thead><tr>
              <th style={th}>#</th>
              <th style={{...th,textAlign:"left"}}>Agent</th>
              {DAYS.map(d=><th key={d} style={{...th,minWidth:160}}>{d}</th>)}
            </tr></thead>
            <tbody>
              <tr style={{background:"#fffbeb"}}>
                <td colSpan={2} style={{...td,fontSize:11,color:"#92400e",fontWeight:700,textAlign:"center",whiteSpace:"nowrap"}}>📣 Notes</td>
                {DAYS.map(d=>(
                  <td key={d} style={{...td,verticalAlign:"top",padding:"6px 8px"}}>
                    {getNotes(d).map(n=>(
                      <div key={n.id} style={{display:"flex",alignItems:"flex-start",gap:4,marginBottom:4,background:"white",borderRadius:6,padding:"4px 6px",border:"1px solid #fcd34d",fontSize:11}}>
                        <span>{n.emoji}</span><span style={{flex:1,color:"#78350f",lineHeight:1.3}}>{n.text}</span>
                        <button onClick={()=>removeNote(d,n.id)} style={{background:"none",border:"none",color:"#d97706",cursor:"pointer",fontSize:11,padding:0}}>✕</button>
                      </div>
                    ))}
                    <button onClick={()=>{setNoteModal({day:d});setNoteForm({text:"",emoji:"🔥"});}}
                      style={{width:"100%",padding:"2px 0",background:"#fef9c3",color:"#a16207",border:"1px dashed #fcd34d",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:600}}>+ Add note</button>
                  </td>
                ))}
              </tr>
              {sortedAgents.map(agent=>(
                <tr key={agent.id} style={{background:"white",verticalAlign:"top"}}>
                  <td style={{...td,color:"#9ca3af",textAlign:"center"}}>{agent.rank}</td>
                  <td style={{...td,fontWeight:600,whiteSpace:"nowrap"}}>{agent.name}</td>
                  {DAYS.map(d=>{
                    const cell=getCell(agent.id,d);
                    return(
                      <td key={d} style={{...td,minWidth:160,background:cell.overtimes.length>0?"#ede9fe":"white"}}>
                        <div style={{fontSize:11,color:"#6b7280",background:"#f3f4f6",borderRadius:4,padding:"2px 6px",textAlign:"center",marginBottom:6}}>
                          {cell.shift||<span style={{color:"#d1d5db"}}>No shift</span>}
                        </div>
                        {cell.overtimes.map((ot,i)=>(
                          <div key={ot.id} style={{marginBottom:6,background:"white",borderRadius:6,padding:6,border:"1px solid #e0e7ff"}}>
                            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}>
                              <span style={{fontSize:10,color:"#7c3aed",fontWeight:700}}>OT {i+1}</span>
                              {ot.approved===true&&<span style={{fontSize:10,background:"#dcfce7",color:"#15803d",borderRadius:4,padding:"1px 4px"}}>👍</span>}
                              {ot.approved===false&&<span style={{fontSize:10,background:"#fee2e2",color:"#dc2626",borderRadius:4,padding:"1px 4px"}}>👎</span>}
                              <button onClick={()=>removeOT(agent.id,d,ot.id)} style={{marginLeft:"auto",background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontSize:13}}>✕</button>
                            </div>
                            <div style={{display:"flex",gap:3,marginBottom:4,alignItems:"center"}}>
                              <select value={ot.start} onChange={e=>updateOTTime(agent.id,d,ot.id,"start",e.target.value)}
                                style={{...sel,background:ot.start?"#7c3aed":"#f3f4f6",color:ot.start?"white":"#9ca3af",flex:1}}>
                                <option value="">Start</option>
                                {TIME_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}
                              </select>
                              <span style={{fontSize:11,color:"#9ca3af"}}>→</span>
                              <select value={ot.end} onChange={e=>updateOTTime(agent.id,d,ot.id,"end",e.target.value)}
                                style={{...sel,background:ot.end?"#7c3aed":"#f3f4f6",color:ot.end?"white":"#9ca3af",flex:1}}>
                                <option value="">End</option>
                                {TIME_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}
                              </select>
                            </div>
                            {(ot.start||ot.slot)&&(
                              <button onClick={()=>openConfirm(agent.id,d,ot.id)}
                                style={{fontSize:11,padding:"2px 4px",width:"100%",border:"none",borderRadius:4,cursor:"pointer",background:ot.confirmed?"#16a34a":"#f59e0b",color:"white"}}>
                                {ot.confirmed?`✅ ${ot.sales}`:"⏳ Confirm"}
                              </button>
                            )}
                          </div>
                        ))}
                        {cell.overtimes.length<6&&(
                          <button onClick={()=>addOT(agent.id,d)}
                            style={{width:"100%",padding:"4px 0",background:"#e0e7ff",color:"#4f46e5",border:"1px dashed #818cf8",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>
                            + Add OT
                          </button>
                        )}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* MANAGER */}
      {tab==="manager"&&(
        <div>
          <div style={{background:"#1e1b4b",borderRadius:12,padding:"14px 20px",marginBottom:20,color:"white",display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:24}}>🔐</span>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>Manager Approval</div>
              <div style={{fontSize:12,opacity:.7}}>Review and approve or deny OT requests — {weekLabel(activeWeek)}</div>
            </div>
          </div>
          {managerRows.length===0
            ?<div style={{background:"white",borderRadius:12,padding:40,textAlign:"center",color:"#9ca3af"}}>No OT slots assigned yet. Add OT from the Calendar tab first.</div>
            :DAYS.map(day=>{
              const rows=managerRows.filter(r=>r.day===day);
              if(!rows.length)return null;
              const projHours=rows.reduce((acc,{ot})=>acc+parseHours(ot.slot||buildSlot(ot.start,ot.end)),0);
              const confirmedRows=rows.filter(({ot})=>ot.confirmed);
              const pendingRows=rows.filter(({ot})=>!ot.confirmed);
              return(
                <div key={day} style={{background:"white",borderRadius:12,marginBottom:16,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.07)"}}>
                  <div style={{background:"#1e1b4b",padding:"10px 16px",color:"white",fontWeight:700,fontSize:14}}>{day}</div>
                  <div style={{background:"#f0f4ff",padding:"10px 16px",display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",borderBottom:"1px solid #e0e7ff"}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#4f46e5",textTransform:"uppercase",letterSpacing:.5}}>📋 Projected</span>
                    <span style={{fontSize:13,color:"#374151"}}>👥 <strong>{rows.length}</strong> agent{rows.length!==1?"s":""}</span>
                    <span style={{fontSize:13,color:"#374151"}}>⏱ <strong>{fmtHours(projHours)}</strong> total OT</span>
                    <span style={{fontSize:13,color:"#16a34a"}}>✅ <strong>{confirmedRows.length}</strong> confirmed</span>
                    <span style={{fontSize:13,color:"#f59e0b"}}>⏳ <strong>{pendingRows.length}</strong> pending</span>
                    <span style={{fontSize:13,color:"#4f46e5"}}>👍 <strong>{rows.filter(({ot})=>ot.approved===true).length}</strong> approved &nbsp;👎 <strong>{rows.filter(({ot})=>ot.approved===false).length}</strong> denied</span>
                  </div>
                  {rows.map(({agent,ot})=>(
                    <div key={ot.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:"1px solid #f3f4f6",flexWrap:"wrap"}}>
                      <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,background:ot.approved===true?"#16a34a":ot.approved===false?"#dc2626":"#d1d5db"}}/>
                      <div style={{flex:1,minWidth:120}}>
                        <div style={{fontWeight:600,fontSize:14}}>{agent.name}</div>
                        <div style={{fontSize:12,color:"#6b7280"}}>{ot.slot||`${ot.start} → ${ot.end||"?"}`}{ot.slot&&<span style={{color:"#4f46e5",marginLeft:6}}>· {fmtHours(parseHours(ot.slot))}</span>}</div>
                      </div>
                      <div style={{fontSize:12,padding:"2px 8px",borderRadius:12,background:ot.confirmed?"#dcfce7":"#fef9c3",color:ot.confirmed?"#15803d":"#a16207"}}>
                        {ot.confirmed?"✅ Confirmed":"⏳ Pending"}
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>updateOTApproval(agent.id,day,ot.id,ot.approved===true?null:true)}
                          style={{padding:"6px 14px",fontWeight:600,fontSize:13,cursor:"pointer",borderRadius:8,border:`2px solid ${ot.approved===true?"#16a34a":"#d1d5db"}`,background:ot.approved===true?"#dcfce7":"white",color:ot.approved===true?"#15803d":"#374151"}}>
                          👍 Approve
                        </button>
                        <button onClick={()=>updateOTApproval(agent.id,day,ot.id,ot.approved===false?null:false)}
                          style={{padding:"6px 14px",fontWeight:600,fontSize:13,cursor:"pointer",borderRadius:8,border:`2px solid ${ot.approved===false?"#dc2626":"#d1d5db"}`,background:ot.approved===false?"#fee2e2":"white",color:ot.approved===false?"#dc2626":"#374151"}}>
                          👎 Deny
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })
          }
        </div>
      )}

      {/* NOTES */}
      {tab==="notes"&&(
        <div>
          <p style={{color:"#6b7280",fontSize:13,marginBottom:16}}>Add incentives, contests, or reminders per day to motivate agents during OT.</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
            {DAYS.map(day=>{
              const notes=getNotes(day);
              return(
                <div key={day} style={{background:"white",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.07)"}}>
                  <div style={{background:"#fffbeb",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"2px solid #fcd34d"}}>
                    <span style={{fontWeight:700,color:"#92400e"}}>{day}</span>
                    <button onClick={()=>{setNoteModal({day});setNoteForm({text:"",emoji:"🔥"});}} style={{padding:"4px 12px",background:"#f59e0b",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>+ Add</button>
                  </div>
                  <div style={{padding:12,minHeight:80}}>
                    {notes.length===0?<p style={{color:"#d1d5db",fontSize:13,margin:0,textAlign:"center",paddingTop:16}}>No notes yet</p>
                      :notes.map(n=>(
                        <div key={n.id} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8,background:"#fffbeb",borderRadius:8,padding:"8px 10px",border:"1px solid #fde68a"}}>
                          <span style={{fontSize:20}}>{n.emoji}</span>
                          <span style={{flex:1,fontSize:13,color:"#78350f",lineHeight:1.4}}>{n.text}</span>
                          <button onClick={()=>removeNote(day,n.id)} style={{background:"none",border:"none",color:"#d97706",cursor:"pointer",fontSize:14,padding:0}}>✕</button>
                        </div>
                      ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* SUMMARY */}
      {tab==="summary"&&(
        <div>
          <div style={{background:"#4f46e5",borderRadius:12,padding:"16px 20px",marginBottom:20,color:"white"}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:12}}>📊 {weekLabel(activeWeek)} — {fmtWeek(weekMon(activeWeek))}</div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {[["OT Sessions",wkO,"#a5b4fc"],["Total Sales",wkS.toFixed(2),"#6ee7b7"],["Total Hours",fmtHours(wkH),"#fcd34d"],["Points",wkP,"#f9a8d4"]].map(([l,v,c])=>(
                <div key={l} style={{background:"rgba(255,255,255,.15)",borderRadius:8,padding:"10px 16px",minWidth:110}}>
                  <div style={{fontSize:11,opacity:.8}}>{l}</div><div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{background:"white",borderRadius:12,marginBottom:20,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
            <div style={{background:"#f0f4ff",padding:"10px 16px",fontWeight:700,fontSize:14}}>👤 Agent Totals — {weekLabel(activeWeek)}</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#fafafa"}}>{["Rank","Agent","Sessions","OT Hours","Sales","Points"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
              <tbody>
                {sortedAgents.map((agent,i)=>{
                  const t=agentTotals[agent.id]||{sales:0,points:0,hours:0,sessions:0};
                  return(
                    <tr key={agent.id} style={{background:i%2===0?"white":"#fafafa",opacity:t.sessions>0?1:.45}}>
                      <td style={{...td,textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${agent.rank}`}</td>
                      <td style={{...td,fontWeight:600}}>{agent.name}{agent.rankPct!=null?<span style={{fontSize:11,color:"#6b7280",marginLeft:6}}>({agent.rankPct}%)</span>:null}</td>
                      <td style={{...td,textAlign:"center"}}>{t.sessions||"—"}</td>
                      <td style={{...td,textAlign:"center"}}>{t.hours>0?fmtHours(t.hours):"—"}</td>
                      <td style={{...td,textAlign:"center"}}>{t.sales>0?t.sales.toFixed(2):"—"}</td>
                      <td style={{...td,textAlign:"center"}}>{t.points||"—"}</td>
                    </tr>
                  );
                })}
                <tr style={{background:"#f0fdf4",fontWeight:700}}>
                  <td style={td} colSpan={2}>Week Total</td>
                  <td style={{...td,textAlign:"center"}}>{wkO}</td>
                  <td style={{...td,textAlign:"center"}}>{fmtHours(wkH)}</td>
                  <td style={{...td,textAlign:"center"}}>{wkS.toFixed(2)}</td>
                  <td style={{...td,textAlign:"center"}}>{wkP}</td>
                </tr>
              </tbody>
            </table>
          </div>
          {DAYS.map(day=>{
            const d=sumByDay[day];
            if(!d.agents.length)return(
              <div key={day} style={{background:"white",borderRadius:10,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12,opacity:.45}}>
                <span style={{fontWeight:600,width:100}}>{day}</span><span style={{color:"#9ca3af",fontSize:13}}>No confirmed OT</span>
              </div>
            );
            return(
              <div key={day} style={{background:"white",borderRadius:10,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
                <div style={{background:"#f0f4ff",padding:"10px 16px",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,fontSize:15,minWidth:90}}>{day}</span>
                  <span style={{fontSize:13,color:"#4f46e5"}}>🔢 {d.totalOTs} sessions</span>
                  <span style={{fontSize:13,color:"#059669"}}>💰 {d.totalSales.toFixed(2)}</span>
                  <span style={{fontSize:13,color:"#b45309"}}>⏱ {fmtHours(d.totalHours)}</span>
                  <span style={{fontSize:13,color:"#7c3aed"}}>⭐ {d.totalPoints} pts</span>
                </div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:"#fafafa"}}>{["Agent","OT Slot","Hours","Approved","Sales","Points"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
                  <tbody>
                    {d.agents.map((a,i)=>(
                      <tr key={i} style={{background:i%2===0?"white":"#fafafa"}}>
                        <td style={td}>{a.name}</td><td style={td}>{a.slot}</td>
                        <td style={{...td,textAlign:"center"}}>{fmtHours(a.hours)}</td>
                        <td style={{...td,textAlign:"center"}}>{a.approved===true?"👍":a.approved===false?"👎":"—"}</td>
                        <td style={{...td,textAlign:"center"}}>{a.sales.toFixed(2)}</td>
                        <td style={{...td,textAlign:"center"}}>{a.points}</td>
                      </tr>
                    ))}
                    <tr style={{background:"#f0fdf4",fontWeight:700}}>
                      <td style={td} colSpan={2}>Daily Total</td>
                      <td style={{...td,textAlign:"center"}}>{fmtHours(d.totalHours)}</td>
                      <td style={td}/>
                      <td style={{...td,textAlign:"center"}}>{d.totalSales.toFixed(2)}</td>
                      <td style={{...td,textAlign:"center"}}>{d.totalPoints}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            );
          })}
        </div>
      )}

      {/* RANKING */}
      {tab==="ranking"&&(
        <div style={{background:"white",borderRadius:12,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h2 style={{margin:0,fontSize:18}}>🏆 Agent Ranking — {weekLabel(activeWeek)}</h2>
            <button onClick={()=>setRankEdit(!rankEdit)} style={{padding:"8px 16px",background:"#4f46e5",color:"white",border:"none",borderRadius:8,cursor:"pointer"}}>{rankEdit?"✅ Save":"✏️ Edit Ranking"}</button>
          </div>
          <p style={{color:"#6b7280",fontSize:13,marginBottom:16}}>OT assignment priority. Import Rank% via CSV.</p>
          {sortedAgents.map((a,i)=>(
            <div key={a.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid #f3f4f6"}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:i<3?"#fbbf24":"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14}}>
                {i===0?"🥇":i===1?"🥈":i===2?"🥉":a.rank}
              </div>
              <span style={{flex:1,fontWeight:600}}>{a.name}</span>
              {a.rankPct!=null&&<span style={{fontSize:13,background:"#f0f4ff",color:"#4f46e5",padding:"2px 8px",borderRadius:6}}>{a.rankPct}%</span>}
              {rankEdit?<input type="number" value={a.rank} onChange={e=>{const na=agents.map(ag=>ag.id===a.id?{...ag,rank:parseInt(e.target.value)||ag.rank}:ag);setAgents(na);}} style={{width:60,padding:4,border:"1px solid #d1d5db",borderRadius:6,textAlign:"center"}}/>
                :<span style={{color:"#6b7280",fontSize:13}}>Rank #{a.rank}</span>}
            </div>
          ))}
        </div>
      )}

      {/* HISTORY */}
      {tab==="history"&&(
        <div style={{background:"white",borderRadius:12,padding:20}}>
          <h2 style={{margin:"0 0 16px",fontSize:18}}>📋 History — {weekLabel(activeWeek)}</h2>
          {histRows.length===0?<p style={{color:"#9ca3af",textAlign:"center",padding:40}}>No records yet.</p>
            :<div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
                <thead><tr style={{background:"#f8fafc"}}>{["Agent","Day","OT Slot","Hours","Time","Approved","Confirmed","Sales","Autopays","Points"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
                <tbody>
                  {histRows.map((h,i)=>(
                    <tr key={i} style={{background:i%2===0?"white":"#fafafa"}}>
                      <td style={td}>{h.agentName}</td><td style={td}>{h.day}</td><td style={td}>{h.slot}</td>
                      <td style={{...td,textAlign:"center"}}>{fmtHours(h.hours)}</td>
                      <td style={td}>{h.timeType==="real"?`🕐 ${h.realTime||""}`:"✅ Same"}</td>
                      <td style={{...td,textAlign:"center"}}>{h.approved===true?"👍":h.approved===false?"👎":"—"}</td>
                      <td style={{...td,textAlign:"center"}}>{h.confirmed?"✅":"❌"}</td>
                      <td style={{...td,textAlign:"center"}}>{h.sales||"-"}</td>
                      <td style={{...td,textAlign:"center"}}>{h.autopays||"-"}</td>
                      <td style={{...td,textAlign:"center"}}>{h.points||"-"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>}
        </div>
      )}

      {/* IMPORT */}
      {tab==="import"&&(
        <div style={{background:"white",borderRadius:12,padding:24}}>
          <h2 style={{margin:"0 0 8px",fontSize:18}}>📂 Import Shifts — {weekLabel(activeWeek)}</h2>
          <p style={{color:"#6b7280",fontSize:13,marginBottom:16}}>Edit in Excel, save as <strong>CSV</strong>, then upload. Columns: <strong>Agent</strong>, <strong>Rank%</strong>, then one per day.</p>
          {activeWeek===nextKey&&(
            <div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:8,padding:"12px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{fontSize:13,color:"#92400e",flex:1}}>💡 Start next week from this week's shifts?</span>
              <button onClick={copyToNextWeek} style={{padding:"8px 16px",background:"#f59e0b",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}}>📋 Copy This Week's Shifts</button>
            </div>
          )}
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
            <button onClick={exportTemplate} style={{padding:"10px 20px",background:"#059669",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}}>⬇️ Download CSV Template</button>
            <label style={{padding:"10px 20px",background:"#4f46e5",color:"white",borderRadius:8,cursor:"pointer",fontWeight:600}}>
              ⬆️ Upload CSV<input type="file" accept=".csv" onChange={handleCSVImport} style={{display:"none"}}/>
            </label>
          </div>
          {importMsg&&<div style={{padding:"10px 16px",borderRadius:8,fontSize:14,background:importMsg.startsWith("✅")?"#d1fae5":"#fee2e2",color:importMsg.startsWith("✅")?"#065f46":"#991b1b"}}>{importMsg}</div>}
        </div>
      )}

      {/* NOTE MODAL */}
      {noteModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"white",borderRadius:16,padding:24,width:360}}>
            <h3 style={{margin:"0 0 4px"}}>📣 Add Note</h3>
            <p style={{color:"#6b7280",fontSize:13,marginBottom:16}}>{noteModal.day} — {weekLabel(activeWeek)}</p>
            <div style={{marginBottom:14}}>
              <span style={{fontSize:13,color:"#6b7280",display:"block",marginBottom:6}}>Pick an emoji</span>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {EMOJIS.map(e=>(
                  <button key={e} onClick={()=>setNoteForm(f=>({...f,emoji:e}))}
                    style={{fontSize:20,padding:"4px 6px",borderRadius:6,cursor:"pointer",border:`2px solid ${noteForm.emoji===e?"#f59e0b":"#e5e7eb"}`,background:noteForm.emoji===e?"#fffbeb":"white"}}>{e}</button>
                ))}
              </div>
            </div>
            <label style={{display:"block",marginBottom:16}}>
              <span style={{fontSize:13,color:"#6b7280"}}>Message / Incentive</span>
              <textarea value={noteForm.text} onChange={e=>setNoteForm(f=>({...f,text:e.target.value}))} placeholder="e.g. $1 bonus per sale today!"
                style={{display:"block",width:"100%",marginTop:4,padding:"8px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14,boxSizing:"border-box",minHeight:80,resize:"vertical"}}/>
            </label>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setNoteModal(null)} style={{flex:1,padding:10,border:"1px solid #d1d5db",borderRadius:8,cursor:"pointer",background:"white"}}>Cancel</button>
              <button onClick={()=>addNote(noteModal.day)} style={{flex:1,padding:10,background:"#f59e0b",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}}>Save Note</button>
            </div>
          </div>
        </div>
      )}

      {/* CONFIRM MODAL */}
      {confirmModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"white",borderRadius:16,padding:24,width:340,maxHeight:"90vh",overflowY:"auto"}}>
            <h3 style={{margin:"0 0 4px"}}>Confirm Overtime</h3>
            <p style={{color:"#6b7280",fontSize:13,marginBottom:16}}>
              {agents.find(a=>a.id===confirmModal.aid)?.name} — {confirmModal.day}<br/>
              <strong>{getCell(confirmModal.aid,confirmModal.day).overtimes.find(o=>o.id===confirmModal.otId)?.slot}</strong>
            </p>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,cursor:"pointer"}}>
              <input type="checkbox" checked={confirmForm.confirmed} onChange={e=>setConfirmForm({...confirmForm,confirmed:e.target.checked})}/>
              <span style={{fontWeight:600}}>OT Completed</span>
            </label>
            <div style={{marginBottom:14}}>
              <span style={{fontSize:13,color:"#6b7280",display:"block",marginBottom:6}}>⏱ OT Time</span>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {[{val:"same",label:"✅ Same as scheduled"},{val:"real",label:"🕐 Real time (specify)"}].map(({val,label})=>(
                  <label key={val} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"7px 10px",borderRadius:8,border:`2px solid ${confirmForm.timeType===val?"#4f46e5":"#e5e7eb"}`,background:confirmForm.timeType===val?"#eef2ff":"white",fontSize:13}}>
                    <input type="radio" name="timeType" value={val} checked={confirmForm.timeType===val} onChange={()=>setConfirmForm({...confirmForm,timeType:val,realStart:"",realEnd:""})} style={{accentColor:"#4f46e5"}}/>
                    {label}
                  </label>
                ))}
              </div>
              {confirmForm.timeType==="real"&&(
                <div style={{display:"flex",gap:6,marginTop:8,alignItems:"center"}}>
                  <select value={confirmForm.realStart} onChange={e=>setConfirmForm({...confirmForm,realStart:e.target.value})}
                    style={{flex:1,padding:"6px 8px",border:"1px solid #d1d5db",borderRadius:8,fontSize:13}}>
                    <option value="">Start</option>
                    {TIME_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                  <span style={{color:"#9ca3af"}}>→</span>
                  <select value={confirmForm.realEnd} onChange={e=>setConfirmForm({...confirmForm,realEnd:e.target.value})}
                    style={{flex:1,padding:"6px 8px",border:"1px solid #d1d5db",borderRadius:8,fontSize:13}}>
                    <option value="">End</option>
                    {TIME_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
              )}
            </div>
            {[{label:"Sales",key:"sales",ph:"0.00"},{label:"How many Autopays",key:"autopays",ph:"0"},{label:"Total Points Sales",key:"points",ph:"0"}].map(({label,key,ph})=>(
              <label key={key} style={{display:"block",marginBottom:12}}>
                <span style={{fontSize:13,color:"#6b7280"}}>{label}</span>
                <input type="number" value={confirmForm[key]} placeholder={ph} onChange={e=>setConfirmForm({...confirmForm,[key]:e.target.value})}
                  style={{display:"block",width:"100%",marginTop:4,padding:"8px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14,boxSizing:"border-box"}}/>
              </label>
            ))}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button onClick={()=>setConfirmModal(null)} style={{flex:1,padding:10,border:"1px solid #d1d5db",borderRadius:8,cursor:"pointer",background:"white"}}>Cancel</button>
              <button onClick={saveConfirm} style={{flex:1,padding:10,background:"#4f46e5",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600}}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
